<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="atmos. — a beautiful weather app" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="color-scheme" content="dark light" />
    <title>atmos. — Weather</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="weather-app" theme="dark">
      <!-- Noise texture overlay -->
      <div class="noise-overlay"></div>

      <div class="container">
        <!-- NAV -->
        <nav>
          <div class="nav-brand">atmos.</div>
          <div class="nav-actions">
            <button class="nav-btn" id="theme-toggle" title="Toggle theme">
              <i class="bi bi-sun-fill theme-icon-light"></i>
              <i class="bi bi-moon-stars-fill theme-icon-dark"></i>
            </button>
            <button class="nav-btn" id="geo-btn" title="Use my location">
              <i class="bi bi-crosshair"></i>
            </button>
          </div>
        </nav>

        <!-- SEARCH -->
        <div class="search-wrapper">
          <form class="search-form" id="searchform">
            <i class="bi bi-search search-icon"></i>
            <input
              type="text"
              placeholder="Search city..."
              id="city"
              autocomplete="off"
            />
          </form>
        </div>

        <!-- ERROR -->
        <div class="error-message" id="error-message"></div>

        <!-- LOADING -->
        <div class="loading-spinner" id="loading-spinner">
          <div class="spinner"></div>
        </div>

        <!-- HERO -->
        <section class="hero-section">
          <div class="hero-left">
            <p class="hero-city weather-state-location">Search a city</p>
            <p class="hero-date weather-current-name"></p>
            <h1 class="hero-temp weather-state-celcius">--°</h1>
            <div class="hero-divider"></div>
            <p class="hero-condition weather-condition-text">--</p>
          </div>
          <div class="hero-right">
            <img
              src=""
              alt="Current weather condition icon"
              id="weather-state-icon"
              class="hero-icon"
            />
            <div class="hero-pills">
              <span class="pill weather-feelslike">
                <i class="bi bi-thermometer-half"></i> --
              </span>
              <span class="pill wind-speed">
                <i class="bi bi-wind"></i> --
              </span>
              <span class="pill humidity">
                <i class="bi bi-droplet-half"></i> --
              </span>
            </div>
          </div>
        </section>

        <!-- DETAILS GRID -->
        <section class="details-grid">
          <div class="detail-card">
            <div class="detail-header">
              <i class="bi bi-brightness-high"></i>
              <span class="detail-label">UV Index</span>
            </div>
            <p class="detail-value uv">--</p>
          </div>
          <div class="detail-card">
            <div class="detail-header">
              <i class="bi bi-speedometer"></i>
              <span class="detail-label">Pressure</span>
            </div>
            <p class="detail-value air-pressure-value">--</p>
          </div>
          <div class="detail-card">
            <div class="detail-header">
              <i class="bi bi-eye"></i>
              <span class="detail-label">Visibility</span>
            </div>
            <p class="detail-value visibility">--</p>
          </div>
          <div class="detail-card detail-card-sunrise-sunset">
            <div class="detail-sunrise">
              <div class="detail-header">
                <i class="bi bi-sunrise"></i>
                <span class="detail-label">Sunrise</span>
              </div>
              <p class="detail-value sunrise">--</p>
            </div>
            <div class="detail-sunset">
              <div class="detail-header">
                <i class="bi bi-sunset"></i>
                <span class="detail-label">Sunset</span>
              </div>
              <p class="detail-value sunset">--</p>
            </div>
          </div>
        </section>

        <!-- CHART -->
        <section class="chart-section">
          <p class="section-label">24h Temperature</p>
          <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
          </div>
        </section>

        <!-- FORECAST -->
        <section class="forecast-strip">
          <p class="section-label">7-Day Forecast</p>
          <div class="forecast-cards" id="forecast-cards"></div>
        </section>

        <!-- MAP -->
        <section class="map-section">
          <span class="map-label">Location</span>
          <iframe
            id="map"
            src=""
            width="100%"
            height="280"
            allowfullscreen
            frameborder="0"
          ></iframe>
        </section>

        <!-- Wind direction indicator (hidden visually, keeps JS working) -->
        <div class="wind-arrow" style="display:none;">
          <i class="bi bi-triangle-fill"></i>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./config.js"></script>
    <script src="./script/app.js"></script>
  </body>
</html>
